<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes App</title><style>
*{box-sizing:border-box;font-family:Arial;}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
padding:12px;
min-height:100vh;
}

.app{
width:100%;
max-width:500px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
border-radius:18px;
padding:15px;
color:#fff;
}

h2{
text-align:center;
margin:8px 0 12px;
font-size:18px;
}

textarea{
width:100%;
height:80px;
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
color:#fff;
outline:none;
resize:none;
}

textarea::placeholder{
color:#cbd5e1;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:#fff;
font-weight:bold;
cursor:pointer;
}

.search{
margin-top:10px;
}

input{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.1);
color:#fff;
outline:none;
}

.notes{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
}

.note{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
position:relative;
word-wrap:break-word;
}

.note small{
display:block;
margin-top:5px;
color:#cbd5e1;
font-size:10px;
}

.actions{
margin-top:8px;
display:flex;
gap:5px;
}

.actions button{
padding:6px;
font-size:11px;
}

.pin{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

</style></head>
<body><div class="app">
<div class="card"><h2>📒 My Notes</h2><div style="font-size:12px;color:#fbbf24;background:rgba(245,158,11,0.1);padding:8px;border-radius:10px;margin-bottom:10px;border:1px solid rgba(245,158,11,0.3);">
⚠️ Warning: If you clear browser data or uninstall browser, all notes will be lost because data is stored in LocalStorage.
</div><textarea id="noteText" placeholder="Write your note..."></textarea><button onclick="addNote()">Add Note</button>

<div class="search">
<input type="text" id="search" oninput="renderNotes()" placeholder="Search notes...">
</div><div class="notes" id="notes"></div></div>
</div><script>
let notes = JSON.parse(localStorage.getItem("notesApp")) || [];

function save(){
localStorage.setItem("notesApp", JSON.stringify(notes));
}

function addNote(){
let text = document.getElementById("noteText").value.trim();
if(!text) return alert("Write something");

notes.push({
text,
pinned:false,
time:new Date().toLocaleString()
});

save();
document.getElementById("noteText").value="";
renderNotes();
}

function deleteNote(i){
if(confirm("Are you sure you want to delete this note?")) {
notes.splice(i,1);
save();
renderNotes();
}
}

function pinNote(i){
notes[i].pinned = !notes[i].pinned;
save();
renderNotes();
}

function renderNotes(){
let search = document.getElementById("search").value.toLowerCase();

let filtered = notes
.filter(n => n.text.toLowerCase().includes(search))
.sort((a,b)=> b.pinned - a.pinned);

let box = document.getElementById("notes");
box.innerHTML="";

filtered.forEach((n,i)=>{
box.innerHTML += `
<div class="note">
${n.text}
<small>${n.time}</small>
<div class="actions">
<button class="pin" onclick="pinNote(${i})">📌</button>
<button class="delete" onclick="deleteNote(${i})">🗑</button>
</div>
</div>`;
});
}

renderNotes();
</script></body>
</html>
